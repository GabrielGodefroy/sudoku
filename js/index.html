        <script> console.log("here")

        function clean_grid() {
            for (let r = 0; r < 9 ; r++){
                for (let c = 0; c < 9 ; c++){
                    console.log(`r${r}c${c}`)   
                    document.getElementById(`r${r}c${c}`).value=""
                }
            }
         }   
        </script>

            <button title="Remove all values from current grid" onclick="clean_grid()">Clean </button>
